<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>Offline — PromptVault</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0b;
        color: #f5f5f6;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        min-height: 100dvh;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 360px;
        background: #18181b;
        border: 1px solid #27272a;
        border-radius: 24px;
        padding: 32px 24px;
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        border-radius: 16px;
        background: linear-gradient(135deg, #7c3aed, #4c1d95);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
      }
      .logo svg { width: 32px; height: 32px; }
      h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
      p { margin: 0 0 16px; color: #a1a1aa; font-size: 14px; line-height: 1.5; }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: #ef4444;
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      button {
        margin-top: 20px;
        background: #7c3aed;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        min-height: 44px;
        font-family: inherit;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="7" y="11" width="10" height="9" rx="2" />
          <path d="M9 11V8a3 3 0 0 1 6 0v3" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>
        No internet connection detected. Your saved prompts are still available —
        reconnect to sync new ones.
      </p>
      <div class="status">
        <span class="dot"></span>
        <span>Offline mode</span>
      </div>
      <br />
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
